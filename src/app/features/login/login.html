<div class="container">


    <div class="form">

        <mat-card class="card">
            <mat-card-header>
                <mat-card-title>
                    <h2>Login</h2>
                </mat-card-title>

            </mat-card-header>
            <mat-card-content>
                <form>
                    <div>

                        <mat-form-field appearance="fill" class="full-width">
                            <mat-label>Username</mat-label>
                            <input matInput placeholder="Enter your username" required>
                        </mat-form-field>
                    </div>
                    <div>

                        <mat-form-field appearance="fill" class="full-width">
                            <mat-label>Password</mat-label>
                            <input matInput type="password" placeholder="Enter your password" required>
                        </mat-form-field>
                    </div>
                    <div>

                        <button mat-raised-button color="primary" class="full-width">Login</button>
                    </div>
                </form>

            </mat-card-content>



        </mat-card>



    </div>
    <div class="img"></div>
</div>
