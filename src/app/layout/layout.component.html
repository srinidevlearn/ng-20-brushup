<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) === false">
    <mat-toolbar>Topics</mat-toolbar>
    <mat-nav-list>
      @for (topic of learnTopics();track topic.route) {
      <a mat-list-item [href]="topic.route" [activated]="topic.isActive">{{ topic.name }}</a>
      }

    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    @defer (when (isHandset$ | async)){

      <mat-toolbar color="primary">
        @if (isHandset$ | async) {
        <button type="button" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
        }
        
      </mat-toolbar>
    }
   
     <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
